name: Deploy to Azure VM

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4   # ✅ updated

    # 🔹 Login to Docker Hub
    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 🔹 Build image
    - name: Build Docker Image
      run: docker build -t techno12/billing-app:latest .

    # 🔹 Push image
    - name: Push Docker Image
      run: docker push techno12/billing-app:latest

    # 🔹 Deploy on Azure VM (PASSWORD instead of SSH KEY)
    - name: Deploy to Azure VM
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}   # ✅ changed here
        port: 22
        script: |
          docker pull techno12/billing-app:latest
          docker stop billing-app || true
          docker rm billing-app || true
          docker run -d -p 5000:5000 --name billing-app techno12/billing-app:latest