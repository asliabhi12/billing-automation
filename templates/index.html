<!DOCTYPE html>
<html>
<head>

<title>Excel Billing Processor</title>

<style>



body {
    margin: 0;
    overflow-x: hidden;
    font-family: Arial;
    background:#f5f6fa;
    text-align:center;
    padding-top:100px;
}

/* ===== NAVBAR ===== */

/* ===== NAVBAR ===== */
.navbar{
    position:fixed;
    top:0;
    left:0;
    right:0;               /* 🔥 instead of width:100% */
    
    background:#2c3e50;
    color:white;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:15px 20px;     /* reduced padding */
    box-sizing:border-box;

    overflow:hidden;       /* 🔥 prevents spill */
    z-index:1000;
}

/* Left */
.nav-left{
    font-size:18px;
    font-weight:bold;
    flex-shrink:0;         /* 🔥 prevents shrinking */
}

/* Right */
.nav-right{
    display:flex;
    align-items:center;
    gap:15px;
    flex-shrink:0;         /* 🔥 prevents clipping */
}

/* Links */
.nav-right a{
    color:white;
    text-decoration:none;
    font-size:15px;
    white-space:nowrap;
}

.nav-right a:hover{
    color:#3498db;
}
/* ===== MAIN CONTAINER ===== */
.container{
    background:white;
    width:500px;
    margin:auto;
    padding:40px;
    border-radius:10px;
    box-shadow:0px 5px 20px rgba(0,0,0,0.1);
}

.drop-area{
    border:2px dashed #3498db;
    padding:40px;
    margin-top:20px;
    border-radius:8px;
    cursor:pointer;
}

button{
    margin-top:20px;
    padding:12px 30px;
    background:#3498db;
    border:none;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

.spinner{
    display:none;
    margin-top:20px;
}

</style>

</head>

<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar">
    <div class="nav-left">Billing Tool</div>
    <div class="nav-right">
        <a href="/">Excel</a>
        <a href="/pdf">PDF</a>
    </div>
</nav>

<!-- ===== MAIN UI ===== -->
<div class="container">

<h2>Excel Billing Processor</h2>

<form id="uploadForm" enctype="multipart/form-data">

<div class="drop-area">
<input type="file" name="files" multiple required>
</div>

<button type="submit">Process Files</button>

<div class="spinner" id="spinner">
Processing files...
</div>

</form>

</div>

<script>

const form = document.getElementById("uploadForm");
const spinner = document.getElementById("spinner");

form.addEventListener("submit", async function(e){

    e.preventDefault();

    spinner.style.display = "block";

    const formData = new FormData(form);

    const response = await fetch("/", {
        method: "POST",
        body: formData
    });

    const blob = await response.blob();

    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "transformed.xlsx";
    document.body.appendChild(a);
    a.click();

    a.remove();
    window.URL.revokeObjectURL(url);

    spinner.style.display = "none";
});

</script>

</body>
</html>
