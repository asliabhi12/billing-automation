<!DOCTYPE html>
<html>
<head>
<title>Excel → PDF</title>

<style>
body {
    margin: 0;
    overflow-x: hidden;
    font-family: Arial;
    background:#f5f6fa;
    text-align:center;
    padding-top:100px;
}

.navbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#2c3e50;
    color:white;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:12px 20px;
    box-sizing:border-box;

    z-index:1000;
}

.nav-left{
    font-size:18px;
    font-weight:bold;
}

.nav-right{
    display:flex;
    gap:15px;
}

.nav-right a{
    color:white;
    text-decoration:none;
    font-size:15px;
    white-space:nowrap;
    transition:0.3s;
}

.nav-right a:hover{
    color:#3498db;
}

/* 🔥 Active tab */
.nav-right a.active{
    color:#3498db;
    font-weight:bold;
}

.container {
    background: white;
    width: 500px;
    margin: auto;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
}

button {
    margin-top: 20px;
    padding: 12px 30px;
    background: #27ae60;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
}

.spinner {
    display: none;
    margin-top: 20px;
}
</style>

</head>

<body>
<nav class="navbar">
    <div class="nav-left">Billing Tool</div>
    <div class="nav-right">
        <a href="/">Excel</a>
        <a href="/pdf" class="active">PDF</a>
    </div>
</nav>
<div class="container">

<h2>Upload Excel → Get PDFs</h2>

<form method="POST" enctype="multipart/form-data" onsubmit="showSpinner()">

<input type="file" name="file" accept=".xlsx" required>

<br>

<button type="submit">Generate PDF ZIP</button>

<div class="spinner" id="spinner">Processing...</div>

</form>

</div>

<script>
function showSpinner(){
    document.getElementById("spinner").style.display="block";
}
</script>

</body>
</html>
